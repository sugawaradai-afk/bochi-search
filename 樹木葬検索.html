<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樹木葬検索</title>
<style>

    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: #f0f5f0;
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
  }
  .pw-box {
    background: white;
    border-radius: 12px;
    padding: 36px 28px;
    max-width: 340px;
    width: 90%;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    text-align: center;
  }
  .pw-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .pw-box h2 { font-size: 1.2rem; color: #3a6b35; margin-bottom: 6px; }
  .pw-box p { font-size: 0.82rem; color: #888; margin-bottom: 20px; }
  .pw-box input {
    width: 100%; padding: 12px 14px;
    font-size: 1.4rem; letter-spacing: 0.4em;
    border: 2px solid #b0cfaa; border-radius: 8px;
    outline: none; text-align: center; margin-bottom: 12px;
    box-sizing: border-box;
  }
  .pw-box input:focus { border-color: #3a6b35; }
  .pw-box button {
    width: 100%; padding: 12px;
    background: #3a6b35; color: white;
    border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer;
  }
  .pw-box button:hover { background: #2a5025; }
  .pw-error { color: #c0392b; font-size: 0.85rem; margin-top: 10px; display: none; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'メイリオ', sans-serif;
    background: #f0f5f0;
    min-height: 100vh;
    padding: 20px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  header {
    background: #3a6b35;
    color: white;
    padding: 20px;
    border-radius: 10px 10px 0 0;
    text-align: center;
  }
  header h1 { font-size: 1.4rem; margin-bottom: 4px; }
  header p { font-size: 0.8rem; opacity: 0.8; }
  .search-box {
    background: white;
    padding: 20px;
    border-left: 1px solid #ddd;
    border-right: 1px solid #ddd;
  }
  .search-box label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex: 1;
    padding: 12px 14px;
    font-size: 1.1rem;
    border: 2px solid #b0cfaa;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-row input:focus { border-color: #3a6b35; }
  .input-row button {
    padding: 12px 18px;
    background: #3a6b35;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
  }
  .input-row button:hover { background: #2a5025; }
  .clear-btn {
    margin-top: 8px;
    background: none;
    border: none;
    color: #888;
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: underline;
  }
  .results {
    background: white;
    border-left: 1px solid #ddd;
    border-right: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    border-radius: 0 0 10px 10px;
    padding: 0 20px 20px;
  }
  .result-count {
    font-size: 0.82rem;
    color: #777;
    padding: 10px 0 8px;
    border-bottom: 1px solid #eee;
    margin-bottom: 10px;
  }
  .result-item {
    padding: 12px 14px;
    margin-bottom: 8px;
    background: #f7fbf7;
    border-radius: 8px;
    border-left: 4px solid #3a6b35;
    cursor: pointer;
    transition: background 0.15s;
  }
  .result-item:hover { background: #e8f5e8; }
  .result-item.selected { background: #d0ebd0; border-left-color: #1a4b15; }
  .item-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .name { font-size: 1.05rem; font-weight: bold; color: #333; }
  .role { font-size: 0.75rem; color: #888; margin-left: 6px; }
  .nums {
    display: flex;
    gap: 8px;
  }
  .num-badge {
    font-size: 0.85rem;
    font-weight: bold;
    color: #3a6b35;
    background: white;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1.5px solid #3a6b35;
    white-space: nowrap;
  }
  .buried {
    font-size: 0.82rem;
    color: #666;
    margin-top: 4px;
  }
  .detail-panel {
    margin-top: 10px;
    padding: 16px;
    background: #2a5025;
    color: white;
    border-radius: 10px;
    display: none;
  }
  .detail-panel.show { display: block; }
  .detail-panel .d-title { font-size: 0.85rem; opacity: 0.8; margin-bottom: 4px; }
  .detail-panel .d-name { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; }
  .detail-panel .d-row { display: flex; gap: 12px; margin-bottom: 6px; }
  .detail-panel .d-label { font-size: 0.8rem; opacity: 0.7; min-width: 60px; }
  .detail-panel .d-val { font-size: 1.1rem; font-weight: bold; }
  .detail-panel .d-buried { margin-top: 10px; font-size: 0.9rem; }
  .empty { text-align: center; color: #aaa; padding: 30px 0; font-size: 0.95rem; }
  .hint { text-align: center; color: #bbb; padding: 30px 0; font-size: 0.9rem; line-height: 1.8; }
</style>
</head>
<body>

<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-icon">🌳</div>
    <h2>樹木葬検索</h2>
    <p>パスワードを入力してください</p>
    <input type="password" id="pw-input" placeholder="----" maxlength="20" autocomplete="off">
    <button onclick="checkPW()">確認</button>
    <div class="pw-error" id="pw-error">パスワードが違います</div>
  </div>
</div>

<div id="main-content" style="display:none"><div class="container">
  <header>
    <h1>🌳 樹木葬検索</h1>
    <p>お名前を入力して管理番号・区画番号を検索できます</p>
  </header>
  <div class="search-box">
    <label>お名前（契約者・埋葬者どちらでも可）</label>
    <div class="input-row">
      <input type="text" id="searchInput" placeholder="例：田中、山本 太郎" autocomplete="off">
      <button onclick="doSearch()">検索</button>
    </div>
    <button class="clear-btn" onclick="clearSearch()">クリア</button>
  </div>
  <div class="results" id="results">
    <div class="hint">
      🔍 お名前を入力して検索ボタンを押してください<br>
      <small>部分一致で検索できます（契約者・埋葬者1〜3を検索）</small>
    </div>
  </div>
</div>

let selectedItem = null;

function normalize(str) {
  return str.replace(/\s+/g, '').replace(/　/g, '');
}

function doSearch() {
  const q = normalize(document.getElementById('searchInput').value);
  const results = document.getElementById('results');
  selectedItem = null;

  if (!q) {
    results.innerHTML = '<div class="hint">🔍 お名前を入力して検索ボタンを押してください<br><small>部分一致で検索できます</small></div>';
    return;
  }

  const matched = DATA.filter(d => {
    const names = [d.keiyaku, d.keiyaku_kana, d.mai1, d.mai1_kana, d.mai2, d.mai2_kana, d.mai3, d.mai3_kana];
    return names.some(n => n && normalize(n).includes(q));
  });

  if (matched.length === 0) {
    results.innerHTML = '<div class="empty">「' + q + '」に一致する方は見つかりませんでした</div>';
    return;
  }

  let html = '<div class="result-count">' + matched.length + '件見つかりました</div>';
  html += '<div id="detail-panel" class="detail-panel"></div>';

  matched.forEach((d, i) => {
    const buriedList = [d.mai1, d.mai2, d.mai3].filter(Boolean);
    html += '<div class="result-item" id="item-' + i + '" onclick="selectItem(' + i + ')">';
    html += '<div class="item-top">';
    html += '<span class="name">' + escapeHTML(d.keiyaku) + '<span class="role">（契約者）</span></span>';
    html += '<div class="nums"><span class="num-badge">管理 ' + escapeHTML(d.kanri) + '</span><span class="num-badge">区画 ' + escapeHTML(d.kukaku) + '</span></div>';
    html += '</div>';
    if (buriedList.length > 0) {
      html += '<div class="buried">埋葬者：' + buriedList.map(escapeHTML).join('、') + '</div>';
    }
    html += '</div>';
  });

  results.innerHTML = html;
  window._matched = matched;
}

function selectItem(i) {
  if (selectedItem !== null) {
    const prev = document.getElementById('item-' + selectedItem);
    if (prev) prev.classList.remove('selected');
  }
  selectedItem = i;
  const el = document.getElementById('item-' + i);
  if (el) el.classList.add('selected');

  const d = window._matched[i];
  const buriedList = [
    d.mai1 ? d.mai1 : null,
    d.mai2 ? d.mai2 : null,
    d.mai3 ? d.mai3 : null
  ].filter(Boolean);

  const panel = document.getElementById('detail-panel');
  let html = '<div class="d-title">契約者</div>';
  html += '<div class="d-name">👤 ' + escapeHTML(d.keiyaku) + '</div>';
  html += '<div class="d-row"><div class="d-label">管理No.</div><div class="d-val">' + escapeHTML(d.kanri) + '</div></div>';
  html += '<div class="d-row"><div class="d-label">区画番号</div><div class="d-val">' + escapeHTML(d.kukaku) + '</div></div>';
  if (buriedList.length > 0) {
    html += '<div class="d-buried">🌿 埋葬者：' + buriedList.map(escapeHTML).join('、') + '</div>';
  }
  panel.innerHTML = html;
  panel.classList.add('show');
  panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '<div class="hint">🔍 お名前を入力して検索ボタンを押してください<br><small>部分一致で検索できます</small></div>';
  selectedItem = null;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function checkPW() {
  const val = document.getElementById('pw-input').value;
  if (val === '3112') {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
  } else {
    const err = document.getElementById('pw-error');
    err.style.display = 'block';
    document.getElementById('pw-input').value = '';
  }
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPW();
  });
});
