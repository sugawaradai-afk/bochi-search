  }
  .results {
    background: white;
    border-left: 1px solid #ddd;
    border-right: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    border-radius: 0 0 10px 10px;
    padding: 0 20px 20px;
  }
  .result-count {
    font-size: 0.82rem;
    color: #777;
    padding: 10px 0 8px;
    border-bottom: 1px solid #eee;
    margin-bottom: 10px;
  }
  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    margin-bottom: 6px;
    background: #f9f7f5;
    border-radius: 8px;
    border-left: 4px solid #4a6741;
    cursor: pointer;
    transition: background 0.15s;
  }
  .result-item:hover { background: #eef4eb; }
  .result-item.selected { background: #d8ecd1; border-left-color: #2d4a26; }
  .name { font-size: 1.05rem; font-weight: bold; color: #333; }
  .bochi {

    font-weight: bold;
    color: #4a6741;
    background: white;
    padding: 4px 12px;
    border-radius: 20px;
    border: 2px solid #4a6741;
  }
  .detail-panel {
    margin-top: 10px;
    padding: 16px;
    background: #2d4a26;
    color: white;
    border-radius: 10px;
    text-align: center;
    display: none;
  }

  .detail-panel .d-bochi { font-size: 2.5rem; font-weight: bold; letter-spacing: 2px; }
  .empty {
    text-align: center;
    color: #aaa;
    padding: 30px 0;
    font-size: 0.95rem;
  }
  .hint {
    text-align: center;
    color: #bbb;
    padding: 30px 0;
    font-size: 0.9rem;
    line-height: 1.8;
  }
</style>
</head>

let selectedItem = null;

function normalize(str) {
  return str.replace(/\s+/g, '').replace(/　/g, '');
}

function doSearch() {
  const q = normalize(document.getElementById('searchInput').value);
  const results = document.getElementById('results');
  selectedItem = null;

  if (!q) {
    results.innerHTML = '<div class="hint">🔍 お名前を入力して検索ボタンを押してください<br><small>部分一致で検索できます</small></div>';
    return;
  }

  const matched = DATA.filter(d => normalize(d.name).includes(q));

  if (matched.length === 0) {
    results.innerHTML = '<div class="empty">「' + q + '」に一致する方は見つかりませんでした</div>';
    return;
  }

  let html = '<div class="result-count">' + matched.length + '件見つかりました</div>';
  html += '<div id="detail-panel" class="detail-panel"></div>';
  matched.forEach((d, i) => {
    html += '<div class="result-item" id="item-' + i + '" onclick="selectItem(' + i + ',\'' + escapeJS(d.name) + '\',\'' + escapeJS(d.bochi) + '\')">';
    html += '<span class="name">' + escapeHTML(d.name) + '</span>';
    html += '<span class="bochi">' + escapeHTML(d.bochi) + '</span>';
    html += '</div>';
  });
  results.innerHTML = html;
}

function selectItem(i, name, bochi) {
  if (selectedItem !== null) {
    const prev = document.getElementById('item-' + selectedItem);
    if (prev) prev.classList.remove('selected');
  }
  selectedItem = i;
  const el = document.getElementById('item-' + i);
  if (el) el.classList.add('selected');
  const panel = document.getElementById('detail-panel');
  panel.innerHTML = '<div class="d-name">📛 ' + escapeHTML(name) + '</div><div class="d-bochi">🪦 ' + escapeHTML(bochi) + '</div>';
  panel.classList.add('show');
  panel.scrollIntoView({behavior: 'smooth', block: 'nearest'});
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '<div class="hint">🔍 お名前を入力して検索ボタンを押してください<br><small>部分一致で検索できます</small></div>';
  selectedItem = null;
}

function escapeHTML(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeJS(str) {
  return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});
